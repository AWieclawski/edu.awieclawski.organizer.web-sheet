<span th:fragment="choose-look-date">

    <form th:action="@{/{path} (path=${pathRedirect})}" method="post" th:object="${datePicker}">
        <div>
            <label for="look-date">Choose the year and month (yyyy-MM):</label>
            <input type="month" th:field="${datePicker.lookDate}" id="look-date"/>
        </div>
        <div>
            <button type="submit" class="button">Submit</button>
        </div>
    </form>

</span>
