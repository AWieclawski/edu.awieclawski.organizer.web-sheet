# spring context variables
server:
  port: 8080
  error:
    whitelabel:
      enabled: false
spring:
  application:
    name: web-sheet-test
  main:
    banner-mode: off
  datasource:
    url: jdbc:sqlite:appdata.db
# end-points
endpoint:
  visitors: api/visitors
  users: api/users
# logging
logging:
  level:
    root: INFO
    org.springframework.web: INFO
    edu.springboot.organizer: DEBUG
# general variables
populate.initial.data: false